services:
  bot:
    image: python:3.12-slim
    container_name: midia-downloader-bot
    cpus: 1.5
    mem_limit: 1g
    pids_limit: 256
    working_dir: /app
    env_file:
      - .env
    volumes:
      - ./:/app
    command: >
      sh -c "apt-get update &&
      apt-get install -y --no-install-recommends ffmpeg &&
      rm -rf /var/lib/apt/lists/* &&
      pip install --no-cache-dir -r requirements.txt &&
      python bot.py"
    restart: unless-stopped
